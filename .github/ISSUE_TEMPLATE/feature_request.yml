name: Feature request
description: A discipline, guard, or integration pantheon should have
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What should it do, and what problem does it kill? If it's a comparison ("X does this"), link X.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [router/recall, verification gate, memory/store, HUD/dashboard, CLI/doctor, skills/disciplines, packs/teams, docs, other]
    validations:
      required: false
