<svg width="760" height="348" viewBox="0 0 760 348" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- terminal demo that PLAYS: lines stream in like a real session (CSS animation,
       runs in GitHub READMEs), then holds. Honors prefers-reduced-motion. -->
  <style><![CDATA[
    /* base states are fully visible: any renderer that ignores CSS animation
       shows the complete final frame, never a blank box. `both` applies the
       from-state during each delay, so the streaming effect is unchanged. */
    .l{animation:in .38s ease-out both}
    @keyframes in{from{opacity:0;transform:translateY(5px)}}
    .t{animation:type 1.1s steps(34,end) .25s both}
    @keyframes type{from{clip-path:inset(-10% 100% -10% 0)}}
    .d1{animation-delay:1.6s}.d2{animation-delay:2.2s}.d3{animation-delay:3.0s}
    .d4{animation-delay:3.35s}.d5{animation-delay:3.7s}.d6{animation-delay:4.6s}
    .d8{animation-delay:6.5s}.d9{animation-delay:7.1s}
    .d10{animation-delay:7.9s}
    .cur{animation:blink 1.1s steps(1) 8.4s infinite}
    @keyframes blink{50%{opacity:0}}
    .gate{animation:in .38s ease-out 5.6s both, pulse 1.2s ease-in-out 6.2s 2}
    @keyframes pulse{50%{opacity:.55}}
    @media (prefers-reduced-motion: reduce){
      .l,.t,.gate,.cur{animation:none}
    }
  ]]></style>

  <rect x="1" y="1" width="758" height="346" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="26" cy="24" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="24" r="6" fill="#febc2e"/>
  <circle cx="66" cy="24" r="6" fill="#28c840"/>
  <text x="380" y="28" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" fill="#8b949e">Claude Code · pantheon</text>
  <line x1="1" y1="42" x2="759" y2="42" stroke="#21262d" stroke-width="1"/>

  <g font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13">
    <text x="24" y="68" class="t"><tspan fill="#3fb950">❯</tspan><tspan fill="#e6edf3"> this bug keeps coming back after every deploy</tspan></text>

    <text x="24" y="92" fill="#a78bfa" class="l d1">[PANTHEON ROUTE: hydra]<tspan fill="#6e7681"> — matched from plain language · logged for adaptive routing</tspan></text>
    <text x="24" y="113" fill="#8b949e" font-style="italic" class="l d2">[PANTHEON RECALL] • chrome leaks procs until OOM — reap stale chrome first  (3d ago)</text>

    <text x="24" y="145" class="l d3"><tspan fill="#d2a8ff" font-weight="bold">🏛 hydra</tspan><tspan fill="#e6edf3"> — slay it, then cauterize.</tspan></text>
    <text x="42" y="166" fill="#8b949e" class="l d4">Task: the timestamp bug that returns after each deploy</text>
    <text x="42" y="187" fill="#8b949e" class="l d5">Plan: reproduce → trace the inbound clock → fix the shared path → seal with a test</text>

    <text x="24" y="215" fill="#6e7681" font-style="italic" class="l d6">⋯ hydra works: reproduces, root-causes, edits, runs the tests ⋯</text>

    <text x="24" y="243" fill="#f85149" class="gate">⛔ pantheon gate — do not finish yet: tests are failing (pytest -q: 1 failed)</text>
    <text x="24" y="264" fill="#3fb950" class="l d8">✓ fixed at the root · pytest -q: 3 passed · regression test added</text>
    <text x="24" y="285" fill="#8b949e" class="l d9">🧾 receipt: hydra — "root-caused inbound clock reuse, sealed" · 1.9k tok</text>

    <g class="l d10">
      <line x1="24" y1="301" x2="736" y2="301" stroke="#21262d" stroke-width="1" stroke-dasharray="3 4"/>
      <text x="24" y="326"><tspan fill="#3fb950">❯</tspan><tspan fill="#e6edf3"> pantheon dashboard</tspan><tspan fill="#6e7681">    # heatmap · spend · receipts · store health</tspan><tspan fill="#3fb950" class="cur"> ▍</tspan></text>
    </g>
  </g>
</svg>
