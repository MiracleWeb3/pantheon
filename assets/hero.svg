<svg width="840" height="216" viewBox="0 0 840 216" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- pantheon hero: meander borders, temple, gradient wordmark with soft glow. Self-contained colors read on light & dark. -->
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.55" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <pattern id="me" width="16" height="10" patternUnits="userSpaceOnUse">
      <path d="M0 8 H12 V2 H2 V5 H8 V8 H16" stroke="#8b949e" stroke-width="1.4" fill="none" opacity="0.45"/>
    </pattern>
  </defs>

  <rect x="70" y="0" width="700" height="10" fill="url(#me)"/>
  <rect x="70" y="206" width="700" height="10" fill="url(#me)"/>

  <g stroke="#98a2b3" stroke-width="2" stroke-linecap="round">
    <path d="M348 46 L420 16 L492 46"/>
    <path d="M338 54 L502 54"/>
    <path d="M356 64 L356 106"/>
    <path d="M388 64 L388 106"/>
    <path d="M420 64 L420 106"/>
    <path d="M452 64 L452 106"/>
    <path d="M484 64 L484 106"/>
    <path d="M344 114 L496 114"/>
    <path d="M334 122 L506 122"/>
  </g>
  <path d="M348 46 L420 16 L492 46" stroke="url(#wg)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <text x="420" y="166" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="42" letter-spacing="16" fill="url(#wg)" filter="url(#soft)" opacity="0.6">PANTHEON</text>
  <text x="420" y="166" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="42" letter-spacing="16" fill="url(#wg)">PANTHEON</text>

  <text x="420" y="192" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11.5"
        letter-spacing="4" fill="#8b949e">DISCIPLINES FOR CODING AGENTS</text>
</svg>
