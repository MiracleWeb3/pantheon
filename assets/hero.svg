<svg width="840" height="260" viewBox="0 0 840 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- pantheon hero: dark title-card panel, starfield (13 mythic disciplines), gold-lit temple,
       gradient wordmark with a slow shimmer sweep, gold meander frame. Self-contained panel
       background so it reads on both light & dark GitHub themes. -->
  <style><![CDATA[
    .tw{animation:tw 3.2s ease-in-out infinite}
    .tw1{animation-delay:0s}.tw2{animation-delay:1.1s}.tw3{animation-delay:2.2s}
    @keyframes tw{0%,100%{opacity:.3}50%{opacity:.9}}
    .shimmer{animation:sweep 6s ease-in-out infinite}
    @keyframes sweep{
      0%{transform:translateX(-150px)}
      40%{transform:translateX(-150px)}
      65%{transform:translateX(700px)}
      100%{transform:translateX(700px)}
    }
    @media (prefers-reduced-motion: reduce){
      .tw{animation:none}
      .shimmer{animation:none;opacity:0}
    }
  ]]></style>

  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.55" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0c766"/>
      <stop offset="1" stop-color="#b8863f"/>
    </linearGradient>
    <linearGradient id="colGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8d9a8"/>
      <stop offset="1" stop-color="#8b7a4a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <pattern id="me" width="16" height="10" patternUnits="userSpaceOnUse">
      <path d="M0 8 H12 V2 H2 V5 H8 V8 H16" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.8"/>
    </pattern>
    <mask id="wordMask" maskUnits="userSpaceOnUse" x="0" y="0" width="840" height="260">
      <rect width="840" height="260" fill="#000"/>
      <text x="420" y="178" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
            font-size="54" letter-spacing="17" fill="#fff">PANTHEON</text>
    </mask>
    <clipPath id="panelClip"><rect x="1" y="1" width="838" height="258" rx="20"/></clipPath>
  </defs>

  <rect x="1" y="1" width="838" height="258" rx="20" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <g clip-path="url(#panelClip)">
    <ellipse cx="420" cy="110" rx="360" ry="180" fill="url(#glow)"/>

    <g fill="#e6edf3">
      <circle cx="48" cy="30" r="1.3" opacity="0.5"/>
      <circle cx="85" cy="62" r="1.1" opacity="0.4"/>
      <circle cx="130" cy="22" r="1.4" opacity="0.6"/>
      <circle cx="175" cy="75" r="1.0" opacity="0.35"/>
      <circle cx="215" cy="40" r="1.5" opacity="0.6" class="tw tw1"/>
      <circle cx="255" cy="95" r="1.1" opacity="0.45"/>
      <circle cx="300" cy="25" r="1.2" opacity="0.5"/>
      <circle cx="545" cy="30" r="1.2" opacity="0.5"/>
      <circle cx="585" cy="90" r="1.1" opacity="0.4"/>
      <circle cx="630" cy="45" r="1.4" opacity="0.55" class="tw tw2"/>
      <circle cx="670" cy="20" r="1.0" opacity="0.4"/>
      <circle cx="715" cy="70" r="1.3" opacity="0.6"/>
      <circle cx="760" cy="35" r="1.5" opacity="0.5" class="tw tw3"/>
    </g>

    <rect x="60" y="14" width="720" height="9" fill="url(#me)"/>
    <rect x="60" y="240" width="720" height="9" fill="url(#me)"/>

    <g>
      <path d="M322 48 L420 34 L518 48 Z" fill="url(#colGrad)" opacity="0.28"/>
      <path d="M322 48 L420 34 L518 48" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      <rect x="330" y="48" width="180" height="8" fill="url(#colGrad)" opacity="0.22" stroke="url(#gold)" stroke-width="1.1"/>
      <g fill="url(#colGrad)">
        <rect x="337" y="58" width="6" height="46"/>
        <rect x="377" y="58" width="6" height="46"/>
        <rect x="417" y="58" width="6" height="46"/>
        <rect x="457" y="58" width="6" height="46"/>
        <rect x="497" y="58" width="6" height="46"/>
      </g>
      <line x1="330" y1="110" x2="510" y2="110" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="320" y1="119" x2="520" y2="119" stroke="url(#gold)" stroke-width="2.4" stroke-linecap="round"/>
    </g>

    <text x="420" y="178" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="54" letter-spacing="17" fill="url(#wg)" filter="url(#soft)" opacity="0.55">PANTHEON</text>
    <text x="420" y="178" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="54" letter-spacing="17" fill="url(#wg)">PANTHEON</text>
    <g mask="url(#wordMask)">
      <rect class="shimmer" x="0" y="120" width="130" height="80" fill="url(#shine)"/>
    </g>

    <text x="420" y="198" text-anchor="middle"
          font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12"
          letter-spacing="4.5" fill="#8b949e">DISCIPLINES FOR CODING AGENTS</text>
    <text x="420" y="215" text-anchor="middle"
          font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11"
          letter-spacing="0.5" fill="#6e7681">16 disciplines · 188 skills · zero dependencies</text>
  </g>
</svg>
