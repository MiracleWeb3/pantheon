<svg width="300" height="16" viewBox="0 0 300 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- greek meander section divider -->
  <defs>
    <pattern id="key" width="16" height="10" patternUnits="userSpaceOnUse">
      <path d="M0 8 H12 V2 H2 V5 H8 V8 H16" stroke="#8b949e" stroke-width="1.4" fill="none" opacity="0.55"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#fff" stop-opacity="1"/>
      <stop offset="0.85" stop-color="#fff" stop-opacity="1"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="m"><rect x="0" y="0" width="300" height="16" fill="url(#fade)"/></mask>
  </defs>
  <rect x="0" y="3" width="300" height="10" fill="url(#key)" mask="url(#m)"/>
</svg>
