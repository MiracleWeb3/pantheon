<svg width="840" height="190" viewBox="0 0 840 190" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- pantheon flow: prompt -> on_prompt -> the agent works -> on_stop -> reply, with the gate's
       loop-back and a shared pantheon.db substrate feeding HUD/dashboard/doctor. Mirrors the
       mermaid diagram in README "How it's wired". -->
  <style><![CDATA[
    .ants{stroke-dasharray:5 4;animation:march 1.2s linear infinite}
    @keyframes march{to{stroke-dashoffset:-18}}
    @media (prefers-reduced-motion: reduce){ .ants{animation:none} }
  ]]></style>

  <defs>
    <linearGradient id="hookGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.55" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <marker id="aGray" viewBox="0 0 8 8" refX="6.5" refY="4" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L8 4 L0 8 Z" fill="#6e7681"/>
    </marker>
    <marker id="aGreen" viewBox="0 0 8 8" refX="6.5" refY="4" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L8 4 L0 8 Z" fill="#3fb950"/>
    </marker>
    <marker id="aRed" viewBox="0 0 8 8" refX="6.5" refY="4" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L8 4 L0 8 Z" fill="#f85149"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="838" height="188" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <rect x="20" y="51" width="112" height="36" rx="18" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="76" y="73" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#e6edf3">[your prompt]</text>

  <line x1="132" y1="69" x2="148" y2="69" stroke="#6e7681" stroke-width="1.6" class="ants" marker-end="url(#aGray)"/>

  <rect x="148" y="40" width="165" height="58" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="230.5" y="58" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13.5" font-weight="700" fill="#e6edf3">on_prompt</text>
  <rect x="160" y="64" width="141" height="2.5" rx="1.25" fill="url(#hookGrad)"/>
  <text x="230.5" y="79" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10.5" fill="#8b949e">route · recall</text>
  <text x="230.5" y="91" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10.5" fill="#8b949e">clarify · budget</text>

  <line x1="313" y1="69" x2="329" y2="69" stroke="#6e7681" stroke-width="1.6" class="ants" marker-end="url(#aGray)"/>

  <rect x="329" y="40" width="140" height="58" rx="10" fill="#0d1117" stroke="#21262d" stroke-width="1.5"/>
  <text x="399" y="74" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11.5" font-style="italic" fill="#6e7681">the agent works</text>

  <line x1="469" y1="69" x2="485" y2="69" stroke="#6e7681" stroke-width="1.6" class="ants" marker-end="url(#aGray)"/>

  <rect x="485" y="40" width="165" height="58" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="567.5" y="58" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13.5" font-weight="700" fill="#e6edf3">on_stop</text>
  <rect x="497" y="64" width="141" height="2.5" rx="1.25" fill="url(#hookGrad)"/>
  <text x="567.5" y="79" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10.5" fill="#8b949e">capture · receipts</text>
  <text x="567.5" y="92" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" font-weight="700" fill="#d2a8ff">GATE</text>

  <line x1="650" y1="69" x2="708" y2="69" stroke="#3fb950" stroke-width="1.6" class="ants" marker-end="url(#aGreen)"/>
  <text x="679" y="59" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#3fb950">clean ✓</text>

  <rect x="708" y="51" width="112" height="36" rx="18" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="764" y="73" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#e6edf3">[reply lands]</text>

  <path d="M567.5 98 C567.5 132 399 132 399 98" fill="none" stroke="#f85149" stroke-width="1.6" class="ants" marker-end="url(#aRed)"/>
  <text x="483" y="136" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10.5" fill="#f85149">gate: refused ↩</text>

  <rect x="148" y="146" width="502" height="24" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.3"/>
  <text x="399" y="162" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#8b949e">pantheon.db <tspan fill="#6e7681">— lessons · receipts · routes · metrics</tspan></text>

  <line x1="230.5" y1="98" x2="230.5" y2="146" stroke="#30363d" stroke-width="1.3"/>
  <circle cx="230.5" cy="98" r="2" fill="#6e7681"/>
  <circle cx="230.5" cy="146" r="2" fill="#6e7681"/>
  <line x1="567.5" y1="98" x2="567.5" y2="146" stroke="#30363d" stroke-width="1.3"/>
  <circle cx="567.5" cy="98" r="2" fill="#6e7681"/>
  <circle cx="567.5" cy="146" r="2" fill="#6e7681"/>

  <line x1="650" y1="158" x2="662" y2="158" stroke="#30363d" stroke-width="1.3"/>
  <rect x="662" y="146" width="158" height="24" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.3"/>
  <text x="741" y="162" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="9" fill="#d2a8ff">HUD · dashboard · doctor</text>
</svg>
